# ============================================================
# RC05 - ms-gateway | Puerto 8080
# Enruta todas las peticiones hacia los microservicios
# ============================================================
server.port=8080
spring.application.name=ms-gateway

# ============================================================
# RUTAS DEL GATEWAY
# Cada ruta mapea un prefijo a su microservicio correspondiente
# ============================================================

# RC01 - ms-auth (usuarios y login) → puerto 8081
spring.cloud.gateway.routes[0].id=ms-auth
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# RC02 - ms-projects (proyectos y clientes) → puerto 8082
spring.cloud.gateway.routes[1].id=ms-projects
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/projects/**

spring.cloud.gateway.routes[2].id=ms-clients
spring.cloud.gateway.routes[2].uri=http://localhost:8082
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/clients/**

# RC03 - ms-continuidad (guiones y escenas) → puerto 8083
spring.cloud.gateway.routes[3].id=ms-guiones
spring.cloud.gateway.routes[3].uri=http://localhost:8083
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/guiones/**

spring.cloud.gateway.routes[4].id=ms-escenas
spring.cloud.gateway.routes[4].uri=http://localhost:8083
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/escenas/**

# RC04 - ms-actores (actores y personajes) → puerto 8084
spring.cloud.gateway.routes[5].id=ms-actores
spring.cloud.gateway.routes[5].uri=http://localhost:8084
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/actores/**

spring.cloud.gateway.routes[6].id=ms-personajes
spring.cloud.gateway.routes[6].uri=http://localhost:8084
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/personajes/**

# ============================================================
# CORS - Permitir peticiones desde el frontend
# ============================================================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*

# Actuator
management.endpoints.web.exposure.include=health,info,gateway
